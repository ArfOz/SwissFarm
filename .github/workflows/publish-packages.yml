name: Publish Packages to GitHub Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@swissfarm'

      - name: Install dependencies
        run: npm ci

      - name: Build types package
        run: npm run build
        working-directory: packages/types

      - name: Build dto package
        run: npm run build
        working-directory: packages/dto

      - name: Publish @swissfarm/types
        run: npm publish
        working-directory: packages/types
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @swissfarm/dto
        run: npm publish
        working-directory: packages/dto
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}